name: Deploy

on:
  push:
    branches: [main, production]
  workflow_dispatch:

jobs:
  deploy-api:
    name: Deploy API to Vercel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/api/package-lock.json
      - run: cd apps/api && npm install && npm run build
      - uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: ${{ github.ref == 'refs/heads/main' && '--prod' || '' }}

  deploy-dashboard:
    name: Deploy Dashboard to Appwrite Sites
    runs-on: ubuntu-latest
    needs: deploy-api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install Appwrite CLI
        run: npm install -g appwrite-cli
      - name: Deploy dashboard
        working-directory: apps/dashboard
        env:
          NEXT_PUBLIC_APPWRITE_ENDPOINT: https://sfo.cloud.appwrite.io/v1
          NEXT_PUBLIC_APPWRITE_PROJECT_ID: ${{ secrets.APPWRITE_PROJECT_ID }}
          API_URL: ${{ secrets.API_URL }}
        run: |
          npm install
          npm run build
          appwrite client \
            --endpoint https://sfo.cloud.appwrite.io/v1 \
            --project-id ${{ secrets.APPWRITE_PROJECT_ID }} \
            --key ${{ secrets.APPWRITE_API_KEY }}
          appwrite sites deploy --site-id ghostssh-dashboard --adapter static
