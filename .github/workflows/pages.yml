name: Deploy Docs to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build docs site
        run: |
          mkdir -p _site
          cp README.md _site/index.md
          cat > _site/index.html << 'HTML'
          <!DOCTYPE html><html><head><meta charset="utf-8"><title>ghostssh</title>
          <style>body{font-family:sans-serif;max-width:800px;margin:2rem auto;padding:0 1rem}pre{background:#f4f4f4;padding:1rem;overflow:auto}</style></head>
          <body><script>
          fetch('index.md').then(r=>r.text()).then(t=>{document.body.innerHTML='<pre>'+t+'</pre>'});
          </script></body></html>
          HTML
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - uses: actions/deploy-pages@v4
        id: deployment
