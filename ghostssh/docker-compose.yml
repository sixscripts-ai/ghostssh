services:
  api:
    build:
      context: ./apps/api
    ports:
      - "8080:8080"
    env_file:
      - ./apps/api/.env
    restart: unless-stopped
  dashboard:
    build:
      context: ./apps/dashboard
    ports:
      - "3000:3000"
    environment:
      - API_URL=http://api:8080
    depends_on:
      - api
    restart: unless-stopped
